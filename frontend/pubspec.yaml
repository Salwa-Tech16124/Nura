name: nura_frontend
description: "NURA AI Health Assistant Frontend"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  audioplayers: ^6.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  mime: ^1.0.4
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/branding/nura_app_icon.png"
  web:
    generate: true
    image_path: "assets/images/branding/nura_app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0056D2"

flutter:
  uses-material-design: true
  assets:
    - assets/images/branding/
    - assets/audio/
